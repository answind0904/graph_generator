<html lang="ko">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편 그래프 생성기 & 퍼센트 계산기</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js Sankey 개발중 플러그인 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-sankey@0.14.0/dist/chartjs-chart-sankey.min.js"></script>
    <!-- Chart.js 데이터 라벨 플러그인 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'MBC Chart';
            src:
                local('MBC NEW Medium'),
                local('MBC 새로움 Medium'),
                local('MBCNEWMedium');
            font-style: normal;
            font-weight: 400;
            font-display: block;
        }

        /* 입력 UI는 기존 Inter 폰트를 유지 */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* 추가 데이터셋의 라벨 스타일 */
        .synced-label {
            width: 40%; /* 2/5 width */
            padding-left: 0.5rem; /* px-2 */
            padding-right: 0.5rem; /* px-2 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #4A5568; /* gray-700 */
        }
        /* 탭 활성화 스타일 */
        .tab-active {
            border-bottom: 2px solid #2563EB;
            color: #2563EB;
            font-weight: 700;
        }
        .tab-inactive {
            color: #6B7280;
            font-weight: 500;
        }
        .tab-inactive:hover {
            color: #374151;
        }
        /* 계산기 입력 필드 스타일 */
        .calc-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #D1D5DB;
            border-radius: 0.375rem;
            text-align: right;
            font-weight: 600;
        }
        .calc-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        /* 드래그 앤 드롭 스타일 */
        .data-row.dragging {
            opacity: 0.5;
            background-color: #F3F4F6;
            border: 1px dashed #9CA3AF;
        }
        /* 핸들에만 커서 포인터 표시 */
        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        /* 컬러 인디케이터 커서 */
        .color-indicator {
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 0 1px #e5e7eb;
            transition: transform 0.1s;
        }
        .color-indicator:hover {
            transform: scale(1.1);
        }
        /* 선/레이더 차트일 때 행 컬러 숨김 처리를 위한 클래스 */
        .hide-row-color .row-color-wrapper {
            display: none !important;
        }
        .hide-item-names .item-label-input {
            display: none !important;
        }
        .hide-item-names .item-value-input {
            flex: 1 1 auto;
            width: auto;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen p-4 sm:p-6 lg:p-8">

    <!-- 탭 네비게이션 -->
    <div class="w-full max-w-[1440px] mx-auto mb-6 flex border-b border-gray-200">
        <button id="tab-graph-btn" class="flex-1 py-4 text-center tab-active transition-colors duration-200" onclick="switchTab('graph')">
            📊 그래프 생성기
        </button>
        <button id="tab-calc-btn" class="flex-1 py-4 text-center tab-inactive transition-colors duration-200" onclick="switchTab('calc')">
            🧮 퍼센트 계산기
        </button>
    </div>

    <!-- 1. 그래프 생성기 섹션 -->
    <div id="graph-section" class="w-full max-w-[1440px] mx-auto grid grid-cols-1 gap-8 lg:grid-cols-3 lg:gap-x-8 lg:gap-y-3">
        
        <!-- 왼쪽: 입력 컨트롤 패널 -->
        <div class="self-start lg:col-span-1 bg-white p-6 rounded-2xl shadow-lg">
            <!-- 그래프 종류 선택 -->
            <div class="mb-5">
                <label for="chartType" class="block text-sm font-medium text-gray-700 mb-2">그래프 종류</label>
                <select id="chartType" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                    <option value="bar">막대 그래프</option>
                    <option value="singleStackedBar">100% 비율 막대 (비교형)</option>
                    <option value="line">선 그래프</option>
                    <option value="doughnut">원 그래프</option>
                    <option value="halfDoughnut">반원 차트</option>
                    <option value="polarArea">폴라 차트</option>
                    <option value="radar">레이더 차트</option>
                    <option value="square">정사각형 차트</option>
                    <option value="sankey">생키 차트 (개발중)</option>
                </select>
            </div>

            <hr class="my-6">

            <!-- 데이터셋 이름 및 전체 컬러 입력 (선/레이더용) -->
            <div class="mb-4 flex gap-2 items-end">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">데이터셋 이름</label>
                    <input type="text" id="mainDatasetName" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" value="데이터셋 1">
                </div>
                <!-- 데이터셋 전체 컬러 선택기 (선/레이더 차트일 때만 표시됨) -->
                <div id="mainDatasetColorContainer" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">색상</label>
                    <div class="relative h-[38px] w-[40px]">
                        <input type="color" id="mainDatasetColor" class="absolute inset-0 w-full h-full p-0 border-0 rounded cursor-pointer" value="#3B82F6">
                    </div>
                </div>
            </div>

            <!-- 동적 데이터 입력 폼 -->
            <div class="flex justify-end mb-2">
                <div class="flex items-center gap-2">
                    <button id="toggleItemNamesBtn" type="button" aria-pressed="false" title="항목명 숨기기" class="flex items-center gap-1.5 bg-gray-200 text-gray-700 font-bold py-1.5 px-3 rounded-md hover:bg-gray-300 transition duration-300 text-xs">
                        <span>항목명</span>
                        <svg class="item-name-visible-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="item-name-hidden-icon hidden" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m3 3 18 18"/><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"/><path d="M9.9 4.2A10.5 10.5 0 0 1 12 4c6.5 0 10 8 10 8a18.3 18.3 0 0 1-3 4.1"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a9.8 9.8 0 0 0 4-.8"/></svg>
                    </button>
                    <button id="addFieldBtn" class="bg-gray-200 text-gray-700 font-bold py-1.5 px-3 rounded-md hover:bg-gray-300 transition duration-300 text-xs">
                        + 항목
                    </button>
                    <button id="addDatasetBtn" class="hidden bg-indigo-100 text-indigo-700 font-bold py-1.5 px-3 rounded-md hover:bg-indigo-200 transition duration-300 text-xs">
                        + 데이터셋
                    </button>
                </div>
            </div>
            <div id="data-input-container" class="space-y-1 mb-3">
                <!-- 자바스크립트로 동적 생성될 입력 필드 영역 -->
            </div>
            
            <!-- 합계 표시 영역 -->
            <div class="text-right font-bold text-lg text-gray-800 mb-4" id="data-sum-display">
                합계: 0
            </div>

            <!-- 다중 데이터셋 입력 영역 -->
            <div id="additional-datasets-container" class="hidden space-y-4 mb-4">
                <!-- 데이터셋 추가 버튼으로 동적 생성 -->
            </div>

            <div id="sankey-transitions-panel" class="hidden mb-4 rounded-lg border border-amber-200 bg-amber-50 p-3">
                <div class="flex items-center justify-between gap-2 mb-3">
                    <div>
                        <h3 class="text-sm font-bold text-amber-900">샌키 전환 관계</h3>
                        <p class="text-xs text-amber-800 mt-1">어느 항목이 다음 데이터셋의 어느 항목으로 이동했는지 입력합니다.</p>
                    </div>
                    <button id="addSankeyTransitionBtn" type="button" class="bg-amber-500 text-white font-bold py-2 px-3 rounded-lg hover:bg-amber-600 transition text-xs whitespace-nowrap">
                        전환 추가
                    </button>
                </div>
                <div id="sankey-transitions-container" class="space-y-2"></div>
                <div id="sankey-transition-empty" class="hidden text-xs text-amber-800 bg-white/70 border border-amber-100 rounded-lg p-3">
                    데이터셋을 하나 이상 추가하면 전환 관계를 입력할 수 있습니다.
                </div>
            </div>

            <!-- 그래프 생성 버튼 -->
            <button onclick="createOrUpdateChart()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300 shadow-md">
                그래프 수동 업데이트
            </button>
        </div>

        <!-- 오른쪽: 그래프 미리보기 및 액션 영역 -->
        <div class="lg:col-span-2 flex flex-col gap-2">
            <div class="relative">
                <div class="w-full overflow-hidden bg-white">
                    <div id="chartPreviewFrame" class="relative w-full aspect-video outline outline-1 outline-gray-300">
                        <img id="localImageOverlay" alt="" class="absolute inset-0 z-0 hidden h-full w-full object-contain pointer-events-none select-none" style="visibility: hidden;">
                        <canvas id="myChart" class="absolute inset-0 z-10 w-full h-full"></canvas>
                        <img id="screenGuideOverlay" src="preview-assets/screen_guide.png" alt="" class="absolute inset-0 z-20 w-full h-full object-fill pointer-events-none select-none transition-opacity duration-100" style="visibility: hidden; opacity: 1;">
                        <div id="chartRangeEditor" class="absolute inset-0 z-30 hidden pointer-events-none select-none">
                            <div data-range-mask="top" class="absolute bg-black/25"></div>
                            <div data-range-mask="right" class="absolute bg-black/25"></div>
                            <div data-range-mask="bottom" class="absolute bg-black/25"></div>
                            <div data-range-mask="left" class="absolute bg-black/25"></div>
                            <div id="chartRangeBox" class="absolute pointer-events-auto touch-none cursor-move border-2 border-blue-500 shadow-[0_0_0_1px_rgba(255,255,255,0.9)]">
                                <button type="button" data-range-handle="nw" aria-label="왼쪽 위 크기 조절" class="absolute left-0 top-0 h-4 w-4 -translate-x-0 -translate-y-0 cursor-nwse-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="n" aria-label="위쪽 크기 조절" class="absolute left-1/2 top-0 h-3 w-6 -translate-x-1/2 cursor-ns-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="ne" aria-label="오른쪽 위 크기 조절" class="absolute right-0 top-0 h-4 w-4 cursor-nesw-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="e" aria-label="오른쪽 크기 조절" class="absolute right-0 top-1/2 h-6 w-3 -translate-y-1/2 cursor-ew-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="se" aria-label="오른쪽 아래 크기 조절" class="absolute bottom-0 right-0 h-4 w-4 cursor-nwse-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="s" aria-label="아래쪽 크기 조절" class="absolute bottom-0 left-1/2 h-3 w-6 -translate-x-1/2 cursor-ns-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="sw" aria-label="왼쪽 아래 크기 조절" class="absolute bottom-0 left-0 h-4 w-4 cursor-nesw-resize border-2 border-white bg-blue-600 shadow"></button>
                                <button type="button" data-range-handle="w" aria-label="왼쪽 크기 조절" class="absolute left-0 top-1/2 h-6 w-3 -translate-y-1/2 cursor-ew-resize border-2 border-white bg-blue-600 shadow"></button>
                            </div>
                        </div>
                    </div>
                </div>
                <aside id="layoutEditorPanel" class="absolute right-2 top-2 z-30 w-10 rounded-lg border border-gray-200 bg-white/95 p-0.5 shadow-lg backdrop-blur-sm">
                    <button id="toggleLayoutEditorBtn" type="button" aria-expanded="false" title="레이아웃 편집" class="flex h-8 w-full items-center justify-center gap-1 rounded-md bg-gray-800 px-1.5 text-[10px] font-bold text-white transition hover:bg-gray-700">
                        <svg class="layout-editor-main-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 7h10"/><path d="M18 7h2"/><circle cx="16" cy="7" r="2"/><path d="M4 17h2"/><path d="M10 17h10"/><circle cx="8" cy="17" r="2"/></svg>
                        <span class="layout-editor-label hidden whitespace-nowrap">편집</span>
                    </button>
                    <div id="layoutEditorControls" class="flex max-h-0 flex-col gap-1 overflow-hidden px-0 py-0 opacity-0 pointer-events-none transition-[max-height,opacity,padding] duration-300 ease-out">
                <div class="group relative w-full">
                    <button id="toggleScreenGuideBtn" type="button" aria-pressed="false" title="화면 가이드 표시하기" class="flex h-8 w-full items-center justify-center rounded-md bg-gray-200 text-gray-500 hover:bg-gray-300 transition">
                        <svg class="screen-guide-visible-icon hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="screen-guide-hidden-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m3 3 18 18"/><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"/><path d="M9.9 4.2A10.5 10.5 0 0 1 12 4c6.5 0 10 8 10 8a18.3 18.3 0 0 1-3 4.1"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a9.8 9.8 0 0 0 4-.8"/></svg>
                    </button>
                    <div class="pointer-events-none invisible absolute right-[calc(100%+8px)] top-1/2 z-50 -translate-y-1/2 whitespace-nowrap rounded-md bg-gray-900 px-2 py-1 text-[10px] font-bold text-white opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">가이드</div>
                </div>
                <div class="group relative w-full">
                    <button id="loadLocalImageBtn" type="button" aria-pressed="false" title="로컬 이미지 불러오기" class="flex h-8 w-full items-center justify-center rounded-md bg-gray-200 text-gray-500 hover:bg-gray-300 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="m21 16-5-5L5 19"/></svg>
                    </button>
                    <input id="localImageInput" type="file" accept="image/*,.psd" class="hidden">
                    <div class="invisible absolute right-full top-1/2 z-50 -translate-y-1/2 pr-2 opacity-0 transition group-hover:visible group-hover:opacity-100">
                        <div class="flex items-center gap-2 whitespace-nowrap rounded-md bg-gray-900 px-2 py-1 text-[10px] font-bold text-white shadow-lg">
                            <span id="localImageTooltipLabel">로컬 이미지</span>
                            <button id="clearLocalImageBtn" type="button" title="로컬 이미지 제거" class="hidden h-6 w-6 items-center justify-center rounded bg-gray-700 text-white hover:bg-gray-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="group relative w-full">
                    <button id="toggleChartRangeEditorBtn" type="button" aria-pressed="false" class="flex h-8 w-full items-center justify-center rounded-md bg-blue-100 text-blue-700 transition hover:bg-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 7V4h3"/><path d="M17 4h3v3"/><path d="M20 17v3h-3"/><path d="M7 20H4v-3"/><rect x="7" y="7" width="10" height="10"/></svg>
                    </button>
                    <div class="invisible absolute right-full top-1/2 z-50 -translate-y-1/2 pr-2 opacity-0 transition group-hover:visible group-hover:opacity-100">
                        <div class="flex items-center gap-2 whitespace-nowrap rounded-md bg-gray-900 px-2 py-1 text-[10px] font-bold text-white shadow-lg">
                            <span>영역 편집</span>
                            <button id="resetChartRangeBtn" type="button" title="그래프 영역 초기화" class="flex h-6 w-6 items-center justify-center rounded bg-gray-700 text-white hover:bg-gray-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="barWidthControl" class="group relative w-full">
                    <button type="button" aria-label="막대 폭" class="flex h-8 w-full items-end justify-center gap-[2px] rounded-md bg-gray-100 pb-1.5 text-gray-600 transition hover:bg-gray-200">
                        <span class="block h-3 w-1.5 bg-current"></span><span class="block h-5 w-1.5 bg-current"></span><span class="block h-4 w-1.5 bg-current"></span>
                    </button>
                    <div class="invisible absolute right-full top-1/2 z-50 w-[152px] -translate-y-1/2 pr-2 opacity-0 transition group-hover:visible group-hover:opacity-100">
                        <div class="w-36 rounded-md bg-white p-2 shadow-xl ring-1 ring-gray-200">
                            <label id="widthControlLabel" for="barWidthSlider" class="mb-1 block text-center text-[10px] font-bold text-gray-700">막대 폭</label>
                            <input id="barWidthSlider" type="range" min="20" max="100" step="5" value="70" class="w-full accent-blue-600" aria-label="전체 막대 폭">
                        </div>
                    </div>
                </div>
                <div id="linePointStyleControl" class="group relative hidden w-full">
                    <button id="toggleLinePointStyleBtn" type="button" aria-pressed="false" aria-label="포인트 모양을 네모로 변경" class="flex h-8 w-full items-center justify-center rounded-md bg-gray-100 text-gray-600 transition hover:bg-gray-200">
                        <svg class="line-point-circle-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="white" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="6"/></svg>
                        <svg class="line-point-rect-icon hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="white" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
                        <svg class="line-point-none-icon hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m6 6 12 12"/><path d="M18 6 6 18"/></svg>
                    </button>
                    <div id="linePointStyleTooltip" class="pointer-events-none invisible absolute right-[calc(100%+8px)] top-1/2 z-50 -translate-y-1/2 whitespace-nowrap rounded-md bg-gray-900 px-2 py-1 text-[10px] font-bold text-white opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">포인트: 원형</div>
                </div>
                <div id="fillOpacityControl" class="group relative w-full">
                    <button type="button" aria-label="채움 오파시티" class="flex h-8 w-full items-center justify-center rounded-md bg-gray-100 text-gray-600 transition hover:bg-gray-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">

    <!-- 2. 퍼센트 계산기 섹션 -->

            <div class="flex flex-col gap-4">

                    <div class="font-bold text-gray-700 w-full md:w-32 flex items-center gap-2"><span class="bg-blue-100 text-blue-600 rounded-full w-6 h-6 flex items-center justify-center text-sm">1</span>비율 값</div>
                    <div class="flex-1 flex flex-col sm:flex-row items-center gap-3 w-full"><div class="flex items-center gap-2 w-full sm:flex-1"><span class="text-gray-600 whitespace-nowrap">전체</span><input type="number" id="calc1-total" class="calc-input" placeholder="10000"></div><div class="flex items-center gap-2 w-full sm:flex-1"><span class="text-gray-600 whitespace-nowrap">의</span><input type="number" id="calc1-percent" class="calc-input" placeholder="20"><span class="text-gray-600 whitespace-nowrap">% 는</span></div></div>

                    <div class="w-full md:w-48 bg-white p-3 rounded-lg border border-green-200 flex items-center justify-between shadow-sm"><span class="text-gray-400 text-sm">=</span><span id="calc2-result" class="text-xl font-bold text-green-600">-</span></div>

                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col md:flex-row items-center gap-4">
                    <div class="font-bold text-gray-700 w-full md:w-32 flex items-center gap-2"><span class="bg-purple-100 text-purple-600 rounded-full w-6 h-6 flex items-center justify-center text-sm">3</span>증감율</div>
                    <div class="flex-1 flex flex-col sm:flex-row items-center gap-3 w-full"><div class="flex items-center gap-2 w-full sm:flex-1"><span class="text-gray-600 whitespace-nowrap">기존</span><input type="number" id="calc3-old" class="calc-input" placeholder="100"></div><div class="flex items-center gap-2 w-full sm:flex-1"><span class="text-gray-600 whitespace-nowrap">이</span><input type="number" id="calc3-new" class="calc-input" placeholder="150"><span class="text-gray-600 whitespace-nowrap">되면</span></div></div>
                    <div class="w-full md:w-48 bg-white p-3 rounded-lg border border-purple-200 flex items-center justify-between shadow-sm"><span class="text-gray-400 text-sm">=</span><span id="calc3-result" class="text-xl font-bold text-purple-600">-</span></div>
                </div>
                <!-- 계산기 4 -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col md:flex-row items-center gap-4">
                    <div class="font-bold text-gray-700 w-full md:w-32 flex items-center gap-2"><span class="bg-orange-100 text-orange-600 rounded-full w-6 h-6 flex items-center justify-center text-sm">4</span>증감량</div>
                    <div class="flex-1 flex flex-col sm:flex-row items-center gap-3 w-full"><div class="flex items-center gap-2 w-full sm:flex-1"><span class="text-gray-600 whitespace-nowrap">값</span><input type="number" id="calc4-val" class="calc-input" placeholder="10000"></div><div class="flex items-center gap-2 w-full sm:flex-1"><span class="text-gray-600 whitespace-nowrap">이</span><input type="number" id="calc4-percent" class="calc-input" placeholder="-20"><span class="text-gray-600 whitespace-nowrap">% 증감</span></div></div>
                    <div class="w-full md:w-48 bg-white p-3 rounded-lg border border-orange-200 flex items-center justify-between shadow-sm"><span class="text-gray-400 text-sm">=</span><span id="calc4-result" class="text-xl font-bold text-orange-600">-</span></div>
                </div>

    <script>
        // --- 탭 전환 및 퍼센트 계산기 로직 (변경 없음) ---
        function switchTab(tabName) {
            const graphSection = document.getElementById('graph-section');
            const calcSection = document.getElementById('calc-section');
            const tabGraphBtn = document.getElementById('tab-graph-btn');
            const tabCalcBtn = document.getElementById('tab-calc-btn');
            if (tabName === 'graph') {
                graphSection.classList.remove('hidden'); graphSection.classList.add('grid');
                calcSection.classList.add('hidden');
                tabGraphBtn.classList.remove('tab-inactive'); tabGraphBtn.classList.add('tab-active');
                tabCalcBtn.classList.remove('tab-active'); tabCalcBtn.classList.add('tab-inactive');
            } else {
                graphSection.classList.add('hidden'); graphSection.classList.remove('grid');
                calcSection.classList.remove('hidden');
                tabGraphBtn.classList.remove('tab-active'); tabGraphBtn.classList.add('tab-inactive');
                tabCalcBtn.classList.remove('tab-inactive'); tabCalcBtn.classList.add('tab-active');
            }
        }
        function formatNum(num) { return parseFloat(num.toFixed(2)).toLocaleString(); }
        function calculate1() {
            const total = parseFloat(document.getElementById('calc1-total').value);
            const percent = parseFloat(document.getElementById('calc1-percent').value);
            const resultEl = document.getElementById('calc1-result');
            if (isNaN(total) || isNaN(percent)) { resultEl.innerText = "-"; return; }
            resultEl.innerText = formatNum(total * (percent / 100));
        }
        function calculate2() {
            const total = parseFloat(document.getElementById('calc2-total').value);
            const part = parseFloat(document.getElementById('calc2-part').value);
            const resultEl = document.getElementById('calc2-result');
            if (isNaN(total) || isNaN(part) || total === 0) { resultEl.innerText = "-"; return; }
            resultEl.innerText = formatNum((part / total) * 100) + "%";
        }
        function calculate3() {
            const oldVal = parseFloat(document.getElementById('calc3-old').value);
            const newVal = parseFloat(document.getElementById('calc3-new').value);
            const resultEl = document.getElementById('calc3-result');
            if (isNaN(oldVal) || isNaN(newVal) || oldVal === 0) { resultEl.innerText = "-"; return; }
            const res = ((newVal - oldVal) / oldVal) * 100;
            const sign = res > 0 ? "증가" : (res < 0 ? "감소" : "변동 없음");
            resultEl.innerText = `${formatNum(Math.abs(res))}% ${sign}`;
            resultEl.style.color = res > 0 ? "#EF4444" : (res < 0 ? "#3B82F6" : "#4B5563");
        }
        function calculate4() {
            const val = parseFloat(document.getElementById('calc4-val').value);
            const percent = parseFloat(document.getElementById('calc4-percent').value);
            const resultEl = document.getElementById('calc4-result');
            if (isNaN(val) || isNaN(percent)) { resultEl.innerText = "-"; return; }
            const res = val * (1 + percent / 100);
            resultEl.innerText = formatNum(res);
            if (percent > 0) resultEl.style.color = "#EF4444";
            else if (percent < 0) resultEl.style.color = "#3B82F6";
            else resultEl.style.color = "#F97316";
        }

        // --- 그래프 생성기 로직 ---
        Chart.register(ChartDataLabels);
        const UI_FONT_FAMILY = "'Inter', sans-serif";
        const CHART_FONT_FAMILY = "'MBC Chart', 'Inter', sans-serif";
        Chart.defaults.font.family = CHART_FONT_FAMILY;

        let myChart = null;
        let dragSrcRow = null;
        let isDataLabelVisible = true; // 라벨 표시 여부 상태 변수
        let isGraphOnlyMode = false;
        let areItemNamesVisible = true;
        let isScreenGuideVisible = false;
        let localImageObjectUrl = null;
        let localImageDragDepth = 0;
        let isLayoutEditorVisible = false;
        let isChartRangeEditorVisible = false;
        const DEFAULT_CHART_RANGE = { x: 8, y: 10, width: 84, height: 81 };
        let chartRange = { ...DEFAULT_CHART_RANGE };
        let chartRangeDrag = null;
        let chartRangeFramePending = false;
        let barWidthPercent = 70;
        let lineStrokeWidth = 10;
        let linePointStyle = 'circle';
        let fillOpacityPercent = 100;
        let yAxisStartMode = 'zero';
        const EXPORT_WIDTH = 1920;
        const EXPORT_HEIGHT = 1080;
        const EXPORT_PIXEL_RATIO = 2;
        const EXPORT_LOGICAL_WIDTH = EXPORT_WIDTH / EXPORT_PIXEL_RATIO;
        const EXPORT_LOGICAL_HEIGHT = EXPORT_HEIGHT / EXPORT_PIXEL_RATIO;
        const squareBottomAlignPlugin = {
            id: 'squareBottomAlign',
            afterDraw(chart) {
                if (chart.options.customChartType !== 'square') return;
                const chartArea = chart.chartArea;
                const ctx = chart.ctx;
                const dataset = chart.data.datasets[0];
                const rawData = (dataset.data || []).filter(item => item.side > 0);
                if (!chartArea || !ctx || rawData.length === 0) return;

                const baseGap = 4;
                const baseTotalWidth = rawData.reduce((sum, item) => {
                    return sum + item.side;
                }, 0) + Math.max(rawData.length - 1, 0) * baseGap;
                const maxSide = rawData.reduce((max, item) => {
                    return Math.max(max, item.side);
                }, 0);
                const widthScale = baseTotalWidth > 0 ? chartArea.width * 0.92 / baseTotalWidth : 1;
                const heightScale = maxSide > 0 ? chartArea.height * 0.78 / maxSide : 1;
                const scale = Math.max(0.1, Math.min(widthScale, heightScale));
                const gap = baseGap;
                const totalSquareWidth = rawData.reduce((sum, item) => {
                    return sum + item.side * scale;
                }, 0);
                const totalGapWidth = Math.max(rawData.length - 1, 0) * gap;
                const totalWidth = totalSquareWidth + totalGapWidth;
                const startX = chartArea.left + Math.max((chartArea.width - totalWidth) / 2, 0);
                const bottomPixel = chartArea.bottom - 4;
                let currentX = startX;

                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                rawData.forEach(item => {
                    const side = item.side * scale;
                    const radius = side / 2;
                    const x = currentX;
                    const y = bottomPixel - side;
                    const label = chart.data.labels[item.index] || '';
                    const value = item.v?.toLocaleString?.() || item.v || '';
                    const fillColor = item.fillColor
                        || (Array.isArray(dataset.backgroundColor) ? dataset.backgroundColor[item.index] : dataset.backgroundColor)
                        || 'rgba(59, 130, 246, 1)';
                    const strokeColor = item.strokeColor
                        || (Array.isArray(dataset.borderColor) ? dataset.borderColor[item.index] : dataset.borderColor)
                        || '#3B82F6';

                    ctx.fillStyle = fillColor;
                    ctx.strokeStyle = strokeColor;
                    ctx.fillRect(x, y, side, side);
                    if ((dataset.borderWidth || 0) > 0) {
                        ctx.lineWidth = dataset.borderWidth;
                        ctx.strokeRect(x, y, side, side);
                    }

                    if (isDataLabelVisible) {
                        const fontSize = Math.max(10, Math.min(14, side * 0.14));
                        ctx.font = `400 ${fontSize}px ${CHART_FONT_FAMILY}`;
                        ctx.fillStyle = getReadableTextColor(fillColor);
                        if (side >= 34) {
                            ctx.fillText(label, x + radius, y + radius - fontSize * 0.6);
                            ctx.fillText(value, x + radius, y + radius + fontSize * 0.8);
                        } else if (side >= 18) {
                            ctx.fillText(value, x + radius, y + radius);
                        }
                    }

                    currentX += radius * 2 + gap;
                });

                ctx.restore();
            }
        };

        function getBaseColors() {
            return [
                { '0.7': 'rgba(59, 130, 246, 0.7)', '1': '#3B82F6' }, // 파랑
                { '0.7': 'rgba(107, 114, 128, 0.7)', '1': '#6B7280' }, // 회색
                { '0.7': 'rgba(239, 68, 68, 0.7)', '1': '#EF4444' }, // 빨강
                { '0.7': 'rgba(16, 185, 129, 0.7)', '1': '#10B981' }, // 초록
                { '0.7': 'rgba(245, 158, 11, 0.7)', '1': '#F59E0B' }, // 주황
                { '0.7': 'rgba(139, 92, 246, 0.7)', '1': '#8B5CF6' }, // 보라
            ];
        }

        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function getBaseLegendLabels(chart) {
            const chartTypeGenerator = Chart.overrides[chart.config.type]?.plugins?.legend?.labels?.generateLabels;
            const generator = chartTypeGenerator || Chart.defaults.plugins.legend.labels.generateLabels;
            return generator(chart);
        }

        function makeColorOpaque(color) {
            if (Array.isArray(color)) return color.map(makeColorOpaque);
            if (typeof color !== 'string') return color;
            if (/^rgba\(/i.test(color)) {
                return color.replace(/rgba\(([^,]+),([^,]+),([^,]+),[^)]+\)/i, 'rgba($1,$2,$3,1)');
            }
            if (/^hsla\(/i.test(color)) {
                return color.replace(/hsla\(([^,]+),([^,]+),([^,]+),[^)]+\)/i, 'hsla($1,$2,$3,1)');
            }
            return color;
        }

        function generateOpaqueLegendLabels(chart) {
            return getBaseLegendLabels(chart).map(label => ({
                ...label,
                fillStyle: makeColorOpaque(label.fillStyle),
                strokeStyle: makeColorOpaque(label.strokeStyle)
            }));
        }

        function getReadableTextColor(color) {
            const rgba = String(color || '').match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (!rgba) return '#111827';
            const r = Number(rgba[1]);
            const g = Number(rgba[2]);
            const b = Number(rgba[3]);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness < 135 ? '#FFFFFF' : '#111827';
        }

        function updateAllTotals() {
            const dataInputs = document.querySelectorAll('#data-input-container input[type="number"]');
            const mainTotal = Array.from(dataInputs)
                .map(input => Number(input.value.trim()) || 0)
                .reduce((a, b) => a + b, 0);
            document.getElementById('data-sum-display').innerText = `합계: ${mainTotal.toLocaleString()}`;

            const additionalBlocks = document.querySelectorAll('.additional-dataset-block');
            additionalBlocks.forEach(block => {
                const inputs = block.querySelectorAll('input[type="number"]');
                const subTotal = Array.from(inputs)
                    .map(input => Number(input.value.trim()) || 0)
                    .reduce((a, b) => a + b, 0);
                
                const sumDisplay = block.querySelector('.dataset-total-display');
                if (sumDisplay) {
                    sumDisplay.innerText = `합계: ${subTotal.toLocaleString()}`;
                }
            });
        }

        function createOrUpdateChart() {
            const chartType = document.getElementById('chartType').value;
            const { labels, datasets, totalSum } = parseAllData(chartType);

            updateAllTotals();

            if (labels.length === 0 || datasets.length === 0 || (datasets[0].data.length === 0 && chartType !== 'singleStackedBar')) {
                if(myChart) myChart.destroy();
                myChart = null;
                return;
            }
            
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();

            const options = buildChartOptions(chartType, totalSum, datasets);
            
            let finalChartType = chartType;
            if (chartType === 'halfDoughnut') finalChartType = 'doughnut';
            if (chartType === 'square') finalChartType = 'scatter';
            if (chartType === 'singleStackedBar') finalChartType = 'bar'; 

            myChart = new Chart(ctx, {
                type: finalChartType,
                data: { labels, datasets },
                options,
                plugins: [squareBottomAlignPlugin, ChartDataLabels],
            });
        }
        
        function parseAllData(chartType) {
            const labelInputs = document.querySelectorAll('#data-input-container input[type="text"]');
            const dataInputs = document.querySelectorAll('#data-input-container input[type="number"]');
            const colorInputs = document.querySelectorAll('#data-input-container input[type="color"]');
            
            const mainDatasetName = document.getElementById('mainDatasetName').value || '데이터셋 1';
            const mainDatasetColor = document.getElementById('mainDatasetColor').value;

            const labelValues = Array.from(labelInputs).map(input => input.value.trim());
            const dataValues = Array.from(dataInputs).map(input => Number(input.value.trim()) || 0);
            const rowColors = Array.from(colorInputs).map(input => input.value);
            
            let totalSum = dataValues.reduce((a, b) => a + b, 0);
            
            const baseColors = getBaseColors();
            const fillOpacity = fillOpacityPercent / 100;
            let datasets = [];
            let chartLabels = [];

            if (chartType === 'sankey') {
                const stages = getSankeyStagesFromUI(dataValues, mainDatasetName, mainDatasetColor, baseColors);
                const transitionRows = readSankeyTransitionRows();

                const nodeLabels = {};
                const nodeColors = {};
                const nodePriority = {};
                const getItemColor = (itemIndex) => hexToRgba(rowColors[itemIndex] || baseColors[itemIndex % baseColors.length]['1'], 1);

                const getItemId = (stageIndex, itemIndex) => `stage-${stageIndex}-item-${itemIndex}`;
                const ensureItemNode = (stageIndex, itemIndex) => {
                    const id = getItemId(stageIndex, itemIndex);
                    const itemLabel = labelValues[itemIndex] || `항목 ${itemIndex + 1}`;
                    nodeLabels[id] = `${stages[stageIndex].name} · ${itemLabel}`;
                    nodeColors[id] = getItemColor(itemIndex);
                    nodePriority[id] = itemIndex;
                    return id;
                };

                const sankeyRows = [];
                const rowsToDraw = transitionRows.length > 0
                    ? transitionRows
                    : buildDefaultSankeyTransitions(stages, labelValues);

                rowsToDraw.forEach(row => {
                    const stageIndex = Math.min(Math.max(row.step, 0), Math.max(stages.length - 2, 0));
                    if (stageIndex < 0 || stageIndex + 1 >= stages.length) return;
                    const previousStage = stages[stageIndex];
                    const currentStage = stages[stageIndex + 1];
                    const fromItemIndex = Math.min(Math.max(row.fromItem, 0), Math.max(labelValues.length - 1, 0));
                    const toItemIndex = Math.min(Math.max(row.toItem, 0), Math.max(labelValues.length - 1, 0));
                    const flow = Math.max(row.flow, 0);
                        if (flow <= 0) return;
                        const from = ensureItemNode(stageIndex, fromItemIndex);
                        const to = ensureItemNode(stageIndex + 1, toItemIndex);
                        sankeyRows.push({
                            from,
                            to,
                            flow,
                            fromColor: nodeColors[from] || hexToRgba(previousStage.color, 1),
                            toColor: nodeColors[to],
                            fromLabel: nodeLabels[from],
                            toLabel: nodeLabels[to]
                        });
                });

                chartLabels = Object.values(nodeLabels);
                datasets.push({
                    label: stages[0].name,
                    data: sankeyRows,

                    colorMode: 'gradient',
                    alpha: fillOpacity,
                    labels: nodeLabels,
                    priority: nodePriority,
                    size: 'max'
                });

            } else if (chartType === 'line' || chartType === 'radar') {
                chartLabels = labelValues;
                datasets.push({
                    label: mainDatasetName,
                    data: dataValues,
                    borderColor: mainDatasetColor,
                    backgroundColor: hexToRgba(mainDatasetColor, chartType === 'radar' ? fillOpacity : 0),
                    pointBackgroundColor: chartType === 'line' ? '#fff' : mainDatasetColor,
                    pointBorderColor: chartType === 'line' ? mainDatasetColor : '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: mainDatasetColor,
                    borderWidth: 3,
                    pointRadius: chartType === 'line'
                        ? (linePointStyle === 'none' ? 0 : Math.max(1, lineStrokeWidth * (linePointStyle === 'circle' ? 2 / 3 : 1)))
                        : 3,
                    pointHoverRadius: chartType === 'line'
                        ? (linePointStyle === 'none' ? 0 : Math.max(2, lineStrokeWidth * (linePointStyle === 'circle' ? 2 / 3 : 1) + 1))
                        : 4,
                    pointBorderWidth: chartType === 'line'
                        ? (linePointStyle === 'none' ? 0 : Math.max(0.5, lineStrokeWidth / 2))
                        : 1,
                    pointHoverBorderWidth: chartType === 'line'
                        ? (linePointStyle === 'none' ? 0 : Math.max(0.5, lineStrokeWidth / 2))
                        : 1,
                    pointStyle: chartType === 'line' && linePointStyle === 'rect' ? 'rect' : 'circle',
                    segment: chartType === 'line' ? { borderWidth: lineStrokeWidth } : undefined,
                    tension: chartType === 'line' ? 0 : 0.1,
                    fill: chartType === 'radar'
                });

                document.querySelectorAll('.additional-dataset-block').forEach((block, index) => {
                    const name = block.querySelector('.dataset-name').value || `데이터셋 ${index + 2}`;
                    const dsColor = block.querySelector('.dataset-color-picker')?.value || baseColors[(index+1)%baseColors.length]['1'];
                    const inputs = block.querySelectorAll('input.dataset-value'); 
                    const arr = Array.from(inputs).map(input => Number(input.value.trim()) || 0);
                    
                    datasets.push({
                        label: name,
                        data: arr,
                        borderColor: dsColor,
                        backgroundColor: hexToRgba(dsColor, chartType === 'radar' ? fillOpacity : 0),
                        pointBackgroundColor: chartType === 'line' ? '#fff' : dsColor,
                        pointBorderColor: chartType === 'line' ? dsColor : '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: dsColor,
                        borderWidth: 3,
                        pointRadius: chartType === 'line'
                            ? (linePointStyle === 'none' ? 0 : Math.max(1, lineStrokeWidth * (linePointStyle === 'circle' ? 2 / 3 : 1)))
                            : 3,
                        pointHoverRadius: chartType === 'line'
                            ? (linePointStyle === 'none' ? 0 : Math.max(2, lineStrokeWidth * (linePointStyle === 'circle' ? 2 / 3 : 1) + 1))
                            : 4,
                        pointBorderWidth: chartType === 'line'
                            ? (linePointStyle === 'none' ? 0 : Math.max(0.5, lineStrokeWidth / 2))
                            : 1,
                        pointHoverBorderWidth: chartType === 'line'
                            ? (linePointStyle === 'none' ? 0 : Math.max(0.5, lineStrokeWidth / 2))
                            : 1,
                        pointStyle: chartType === 'line' && linePointStyle === 'rect' ? 'rect' : 'circle',
                        segment: chartType === 'line' ? { borderWidth: lineStrokeWidth } : undefined,
                        tension: chartType === 'line' ? 0 : 0.1,
                        fill: chartType === 'radar'
                    });
                });

            } else if (chartType === 'singleStackedBar') {
                chartLabels = [mainDatasetName];
                const additionalBlocks = document.querySelectorAll('.additional-dataset-block');
                additionalBlocks.forEach((block, i) => {
                    const name = block.querySelector('.dataset-name').value || `데이터셋 ${i + 2}`;
                    chartLabels.push(name);
                });

                const segments = labelValues.map((name, i) => {
                    const hexColor = rowColors[i] || baseColors[i % baseColors.length]['1'];
                    return {
                        label: name || `항목 ${i + 1}`,
                        values: [dataValues[i]], 
                        backgroundColor: hexToRgba(hexColor, fillOpacity),
                        borderColor: hexToRgba(hexColor, 1.0)
                    };
                });

                additionalBlocks.forEach((block) => {
                    const inputs = block.querySelectorAll('input.dataset-value');
                    inputs.forEach((input, i) => {
                        if (segments[i]) {
                            segments[i].values.push(Number(input.value) || 0);
                        }
                    });
                });

                const barTotals = new Array(chartLabels.length).fill(0);
                segments.forEach(seg => {
                    seg.values.forEach((val, colIndex) => {
                        barTotals[colIndex] += val;
                    });
                });

                datasets = segments.map(seg => {
                    const percentData = seg.values.map((val, colIndex) => {
                        const total = barTotals[colIndex];
                        return total === 0 ? 0 : (val / total) * 100;
                    });

                    return {
                        label: seg.label,
                        data: percentData,
                        originalData: seg.values, 
                        backgroundColor: seg.backgroundColor,
                        borderWidth: 0,
                        inflateAmount: 1,
                        barPercentage: barWidthPercent / 100,
                    };
                });

            } else {
                chartLabels = labelValues;
                const backgroundColors = rowColors.map(hex => hexToRgba(hex, fillOpacity));
                const borderColors = rowColors.map(hex => hexToRgba(hex, 1.0));
                const shouldSealTouchingSegments = ['doughnut', 'halfDoughnut', 'polarArea'].includes(chartType);

                datasets.push({
                    label: mainDatasetName,
                    data: dataValues,
                    backgroundColor: backgroundColors,
                    borderColor: shouldSealTouchingSegments ? backgroundColors : borderColors,
                    hoverBorderColor: shouldSealTouchingSegments ? backgroundColors : borderColors,
                    borderWidth: shouldSealTouchingSegments ? 2 : 0,
                    hoverBorderWidth: shouldSealTouchingSegments ? 2 : 0,
                    borderAlign: shouldSealTouchingSegments ? 'inner' : 'center',
                    spacing: 0,
                    tension: 0.2
                });

                if (chartType === 'square') {
                    const nonNegativeValues = dataValues.map(value => Math.max(value, 0));
                    const maxValue = Math.max(...nonNegativeValues, 0);
                    const squareData = dataValues.map((value, index) => {
                        const MAX_SIDE = 100; 
                        const clampedValue = Math.max(value, 0);
                        const side = maxValue > 0 && clampedValue > 0
                            ? Math.sqrt(clampedValue / maxValue) * MAX_SIDE
                            : 0;
                        return {
                            side: side,
                            v: value,
                            index,
                            fillColor: backgroundColors[index],
                            strokeColor: borderColors[index]
                        };
                    });
                    const PADDING = 4;
                    let currentX = 0, maxSideInRow = 0;
                    
                    const mappedData = squareData.map(square => {
                        const xPos = currentX + (square.side / 2);
                        const yPos = square.side / 2;
                        currentX += square.side + PADDING;
                        maxSideInRow = Math.max(maxSideInRow, square.side);
                        return {
                            x: xPos,
                            y: yPos,
                            v: square.v,
                            side: square.side,
                            index: square.index,
                            fillColor: square.fillColor,
                            strokeColor: square.strokeColor
                        };
                    });

                    datasets[0].data = mappedData;
                    datasets[0].pointStyle = 'rect';
                    datasets[0].radius = 0;
                    datasets[0].hoverRadius = 0;
                    datasets[0].hitRadius = 0;
                    datasets[0].backgroundColor = backgroundColors;
                    datasets[0].borderColor = borderColors;
                } 
            }

            return { labels: chartLabels, datasets, totalSum };
        }

        function getNiceAxisStep(value) {
            if (!Number.isFinite(value) || value <= 0) return 1;
            const magnitude = Math.pow(10, Math.floor(Math.log10(value)));
            const normalized = value / magnitude;
            if (normalized <= 1) return magnitude;
            if (normalized <= 2) return 2 * magnitude;
            if (normalized <= 5) return 5 * magnitude;
            return 10 * magnitude;
        }

        function calculateOptimizedYAxisMin(datasets) {
            const values = datasets
                .flatMap(dataset => Array.isArray(dataset.data) ? dataset.data : [])
                .filter(value => typeof value === 'number' && Number.isFinite(value));
            if (values.length === 0) return undefined;

            const minimum = Math.min(...values);
            const maximum = Math.max(...values);
            if (minimum === 0) return 0;

            const span = maximum - minimum;
            const referenceRange = span > 0 ? span : Math.max(Math.abs(minimum) * 0.2, 1);
            const step = getNiceAxisStep(referenceRange / 5);
            const paddedMinimum = minimum - referenceRange * 0.1;
            let optimizedMinimum = Math.floor(paddedMinimum / step) * step;

            if (minimum > 0) optimizedMinimum = Math.max(0, optimizedMinimum);
            return Number(optimizedMinimum.toPrecision(12));
        }

                button.classList.toggle('hover:bg-gray-100', !isActive);
            });
        }

        function buildChartOptions(chartType, sum, datasets, renderSize = null) {
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                customChartType: chartType,
                datasets: {
                    bar: {
                        barPercentage: barWidthPercent / 100,
                        categoryPercentage: 0.9
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        onClick: null,
                        labels: {
                            padding: 12,
                            generateLabels: generateOpaqueLegendLabels
                        }
                    },
                    title: {
                        display: true,
                        text: '생성된 그래프',
                        font: { family: UI_FONT_FAMILY, size: 18 }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                
                                if (chartType === 'singleStackedBar') {
                                    if (context.raw === null || context.raw === undefined) return label;
                                    const percent = context.raw.toFixed(1);
                                    const originalVal = context.dataset.originalData && context.dataset.originalData[context.dataIndex] !== undefined
                                        ? context.dataset.originalData[context.dataIndex]
                                        : 0;
                                    return `${label}${originalVal.toLocaleString()} (${percent}%)`;
                                }

                                if (chartType === 'sankey') {
                                    const raw = context.raw || {};
                                    const flow = typeof raw.flow === 'number' ? raw.flow.toLocaleString() : raw.flow;
                                    return `${raw.fromLabel || raw.from || ''} -> ${raw.toLabel || raw.to || ''}: ${flow || 0}`;
                                }
                                
                                // For Square chart
                                if (chartType === 'square') {
                                    if (context.raw && context.raw.v !== undefined) {
                                        return label + context.raw.v.toLocaleString();
                                    }
                                    return label;
                                }

                                // Safe check for parsed.y
                                if (context.parsed && typeof context.parsed.y === 'number') {
                                     return label + context.parsed.y.toLocaleString();
                                }
                                
                                // Fallback for raw values
                                if (context.raw !== null && context.raw !== undefined) {
                                    if (typeof context.raw === 'number') {
                                        return label + context.raw.toLocaleString();
                                    }
                                    return label + context.raw; 
                                }
                                
                                return label;
                            }
                        }
                    },
                    datalabels: {
                        // 수치 표시 여부 제어
                        display: function(context) {
                            if (!isDataLabelVisible || isGraphOnlyMode) return false;
                            if (chartType === 'square' || chartType === 'sankey') return false;
                            
                            // halfDoughnut 예외 처리 로직을 여기서 통합
                            if (chartType === 'halfDoughnut') {
                                return context.dataset.data[context.dataIndex] > 0;
                            }
                            return true;
                        },
                        formatter: (value, context) => {
                            const label = context.chart.data.labels[context.dataIndex];
                            if (chartType === 'singleStackedBar') {
                                if (value === 0) return '';
                                const percent = value.toFixed(1);
                                const originalVal = context.dataset.originalData && context.dataset.originalData[context.dataIndex];
                                if (value < 5) return ''; 
                                return `${originalVal}\n(${percent}%)`;
                            }
                            if (['doughnut', 'polarArea', 'halfDoughnut'].includes(chartType)) {
                                const total = context.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                if (total === 0) return `${label}\n0 (0%)`;
                                const percentage = (value / total * 100).toFixed(1) + '%';
                                if (value / total < 0.05) return `${label}\n(${percentage})`;
                                return `${label}\n${value.toLocaleString()}\n(${percentage})`;
                            }
                            if (chartType === 'square') {
                                return `${context.chart.data.labels[context.dataIndex]}\n${value.v.toLocaleString()}`;
                            }
                            if (typeof value === 'number') return value.toLocaleString();
                            return value;
                        },
                        textShadowBlur: 10,
                        textShadowColor: 'rgba(0, 0, 0, 0.3)'
                    }
                },
                animation: false,
            };

            if (chartType === 'singleStackedBar') options.indexAxis = 'y';

            if (['doughnut', 'polarArea', 'halfDoughnut', 'singleStackedBar', 'radar'].includes(chartType)) {
                Object.assign(options.plugins.datalabels, {
                    anchor: 'center', align: 'center', color: '#fff',
                    font: { family: CHART_FONT_FAMILY, weight: 'normal', size: 11 },
                    textShadowBlur: 4, textShadowColor: 'rgba(0,0,0,0.5)'
                });
            } else if (chartType === 'square') {
                Object.assign(options.plugins.datalabels, {
                    anchor: 'center', align: 'center', color: '#000',
                    font: { family: CHART_FONT_FAMILY, weight: 'normal', size: 12 }, textShadowBlur: 0
                });
            } else if (chartType === 'sankey') {
                options.plugins.legend.display = false;
                options.maintainAspectRatio = false;
                options.layout = { padding: 18 };
            } else { 
                Object.assign(options.plugins.datalabels, {
                    anchor: 'end', align: 'end', color: '#333',
                    font: { family: CHART_FONT_FAMILY, weight: 'normal', size: 12 }
                });
            }
            
            if (chartType === 'halfDoughnut') {
                options.rotation = -90; options.circumference = 180;
                // display 로직은 위에서 통합 처리됨
            }

            if (['bar', 'line', 'singleStackedBar'].includes(chartType)) {
                 const isStacked = chartType === 'singleStackedBar';
                 const useTallYAxis = chartType === 'bar' || chartType === 'line';
                 const useOptimizedYAxis = useTallYAxis && yAxisStartMode === 'optimized';
                 const optimizedYAxisMin = useOptimizedYAxis
                    ? calculateOptimizedYAxisMin(datasets)
                    : undefined;
                 if (useTallYAxis) options.maintainAspectRatio = false;
                 options.scales = { 
                    x: { display: true, stacked: isStacked, beginAtZero: true, max: isStacked ? 100 : undefined, grid: { display: !isStacked } }, 
                    y: {
                        display: true,
                        stacked: isStacked,
                        beginAtZero: !useOptimizedYAxis,
                        min: optimizedYAxisMin,
                        grace: useTallYAxis ? '30%' : undefined,
                        grid: { display: !isStacked }
                    } 
                 };
            } else if (chartType === 'square') {
                options.maintainAspectRatio = false;
                options.plugins.legend.display = false;
                const squareData = datasets[0].data;
                const visibleSquareData = squareData.filter(d => d.side > 0);
                const totalHeight = Math.max(...visibleSquareData.map(d => d.y + d.side / 2), 1);
                const totalWidth = Math.max(...visibleSquareData.map(d => d.x + d.side / 2), 1);
                options.scales = {
                    x: { display: false, min: 0, max: totalWidth * 1.05 },
                    y: { display: false, min: 0, max: totalHeight * 1.05 }
                };
                options.layout = { padding: { bottom: 4 } };
            } else if (['radar', 'polarArea'].includes(chartType)) {
                 options.scales = { r: { display: true } };
            }

            applyChartRange(options, renderSize);
            if (isGraphOnlyMode) applyGraphOnlyOptions(options);
            return options;
        }

        function applyChartRange(options, renderSize = null) {
            const frame = document.getElementById('chartPreviewFrame');
            const frameWidth = renderSize?.width || frame?.clientWidth || 640;
            const frameHeight = renderSize?.height || frame?.clientHeight || 360;
            const rangePadding = {
                top: frameHeight * chartRange.y / 100,
                right: frameWidth * (100 - chartRange.x - chartRange.width) / 100,
                bottom: frameHeight * (100 - chartRange.y - chartRange.height) / 100,
                left: frameWidth * chartRange.x / 100
            };
            const currentPadding = options.layout?.padding || 0;
            const basePadding = typeof currentPadding === 'number'
                ? { top: currentPadding, right: currentPadding, bottom: currentPadding, left: currentPadding }
                : {
                    top: currentPadding.top || 0,
                    right: currentPadding.right || 0,
                    bottom: currentPadding.bottom || 0,
                    left: currentPadding.left || 0
                };

            options.layout = {
                ...(options.layout || {}),
                padding: {
                    top: basePadding.top + rangePadding.top,
                    right: basePadding.right + rangePadding.right,
                    bottom: basePadding.bottom + rangePadding.bottom,
                    left: basePadding.left + rangePadding.left
                }
            };
        }

        function applyGraphOnlyOptions(options) {
            const transparent = 'rgba(0, 0, 0, 0)';
            options.plugins.title.color = transparent;
            if (options.plugins.legend.display !== false) {
                options.plugins.legend.display = true;
                options.plugins.legend.labels = {
                    ...(options.plugins.legend.labels || {}),
                    color: transparent,
                    generateLabels(chart) {
                        return getBaseLegendLabels(chart).map((label) => ({
                            ...label,
                            fillStyle: transparent,
                            strokeStyle: transparent,
                            fontColor: transparent
                        }));
                    },
                    padding: 12
                };
            }
            options.plugins.datalabels.display = false;

            if (!options.scales) return;
            Object.keys(options.scales).forEach((scaleKey) => {
                const scale = options.scales[scaleKey];
                if (scale.display === false) return;
                scale.display = true;
                scale.grid = {
                    ...(scale.grid || {}),
                    color: transparent,
                    borderColor: transparent,
                    tickColor: transparent
                };
                scale.border = { ...(scale.border || {}), color: transparent };
                scale.ticks = { ...(scale.ticks || {}), color: transparent };
                scale.title = { ...(scale.title || {}), color: transparent };
                if (scaleKey === 'r') {
                    scale.angleLines = { ...(scale.angleLines || {}), color: transparent };
                    scale.pointLabels = { ...(scale.pointLabels || {}), color: transparent };
                }
            });
        }

        function getColors(count, opacityKey, baseColors, offset = 0) {
            let colors = [];
            for (let i = 0; i < count; i++) {
                const colorObj = baseColors[(i + offset) % baseColors.length];
                const hex = colorObj['1'];
                colors.push(opacityKey === '0.7' ? hexToRgba(hex, 0.7) : hexToRgba(hex, 1.0));
            }
            return colors;
        }

        function handleDragStart(e) { dragSrcRow = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', this.innerHTML); this.classList.add('dragging'); }
        function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
        function handleDragEnd(e) { this.classList.remove('dragging'); dragSrcRow = null; this.setAttribute('draggable', 'false'); }
        function handleDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            if (dragSrcRow !== this) {
                const container = document.getElementById('data-input-container');
                const rows = Array.from(container.children);
                const fromIndex = rows.indexOf(dragSrcRow);
                const toIndex = rows.indexOf(this);
                if (fromIndex < toIndex) this.after(dragSrcRow); else this.before(dragSrcRow);

                document.querySelectorAll('.additional-dataset-block .dataset-body').forEach(body => {
                    const subRows = Array.from(body.children);
                    if (subRows[fromIndex] && subRows[toIndex]) {
                        const subSrc = subRows[fromIndex];
                        const subTarget = subRows[toIndex];
                        if (fromIndex < toIndex) subTarget.after(subSrc); else subTarget.before(subSrc);
                    }
                });
                syncLineDataInputs();
                createOrUpdateChart();
            }
            return false;
        }

        function addInputRow(label = '', value = '', customColor = null) {
            const container = document.getElementById('data-input-container');
            const rowCount = container.children.length;
            const baseColors = getBaseColors();
            const defaultColor = customColor || baseColors[rowCount % baseColors.length]['1'];

        function buildDefaultSankeyTransitions(stages = getSankeyStagesFromUI(), labels = getSankeyItemLabels()) {
            const rows = [];
            for (let step = 0; step < stages.length - 1; step++) {
                labels.forEach((label, itemIndex) => {
                    const nextValue = stages[step + 1].values[itemIndex];
                    const currentValue = stages[step].values[itemIndex];
                    const flow = Math.max(Number(nextValue || currentValue || 0), 0);
                    if (flow > 0) rows.push({ step, fromItem: itemIndex, toItem: itemIndex, flow });
                });
            }
            return rows;
        }

        function refreshSankeyTransitionRows(seedMissing = false) {
            const chartType = document.getElementById('chartType')?.value;
            const panel = document.getElementById('sankey-transitions-panel');
            const container = document.getElementById('sankey-transitions-container');
            const empty = document.getElementById('sankey-transition-empty');
            if (!panel || !container || !empty) return;

            const isSankey = chartType === 'sankey';
            panel.classList.toggle('hidden', !isSankey);
            if (!isSankey) return;

            const stages = getSankeyStagesFromUI();
            const labels = getSankeyItemLabels();
            const existing = readSankeyTransitionRows().filter(row => {
                return row.step < stages.length - 1 && row.fromItem < labels.length && row.toItem < labels.length;
            });

            const keyed = new Set(existing.map(row => `${row.step}:${row.fromItem}:${row.toItem}`));
            if (seedMissing && stages.length > 1) {
                buildDefaultSankeyTransitions(stages, labels).forEach(row => {
                    const key = `${row.step}:${row.fromItem}:${row.toItem}`;
                    if (!keyed.has(key)) {
                        existing.push(row);
                        keyed.add(key);
                    }
                });
            }

            container.innerHTML = '';
            empty.classList.toggle('hidden', stages.length >= 2);
            if (stages.length < 2) return;

            existing.forEach(row => addSankeyTransitionRow(row, false));
        }

        function createExportChartCanvas({ transparent = false, graphOnly = false } = {}) {
            const chartType = document.getElementById('chartType').value;
            const { labels, datasets, totalSum } = parseAllData(chartType);
            if (labels.length === 0 || datasets.length === 0) return null;

            const originalGraphOnlyMode = isGraphOnlyMode;
            isGraphOnlyMode = graphOnly;

            try {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = EXPORT_LOGICAL_WIDTH;
                exportCanvas.height = EXPORT_LOGICAL_HEIGHT;
                exportCanvas.style.width = `${EXPORT_LOGICAL_WIDTH}px`;
                exportCanvas.style.height = `${EXPORT_LOGICAL_HEIGHT}px`;

                const options = buildChartOptions(
                    chartType,
                    totalSum,
                    datasets,
                    { width: EXPORT_LOGICAL_WIDTH, height: EXPORT_LOGICAL_HEIGHT }
                );
                options.responsive = false;
                options.maintainAspectRatio = false;
                options.devicePixelRatio = EXPORT_PIXEL_RATIO;
                options.animation = false;

                const exportBackgroundPlugin = {
                    id: 'exportBackground',
                    beforeDraw(chart) {

                        ctx.globalCompositeOperation = 'destination-over';

                const exportChart = new Chart(exportCanvas.getContext('2d'), {
                    type: getFinalChartType(chartType),
                    data: { labels, datasets },
                    options,
                    plugins: [squareBottomAlignPlugin, ChartDataLabels, exportBackgroundPlugin]

                exportChart.update('none');
                return { canvas: exportCanvas, chart: exportChart };
            } finally {
                isGraphOnlyMode = originalGraphOnlyMode;
