        function isPsdFile(file) {
            return !!file && (/\.psd$/i.test(file.name || '') || file.type === 'image/vnd.adobe.photoshop' || file.type === 'application/x-photoshop');
        }

        function isSupportedLocalImageFile(file) {
            return !!file && (file.type.startsWith('image/') || isPsdFile(file));
        }

        function readAscii(view, offset, length) {
            let result = '';
            for (let i = 0; i < length; i += 1) result += String.fromCharCode(view.getUint8(offset + i));
            return result;
        }

        function decodePackBitsRow(source, sourceOffset, sourceEnd, target) {
            let outputOffset = 0;
            let offset = sourceOffset;
            while (offset < sourceEnd && outputOffset < target.length) {
                const header = source.getInt8(offset);
                offset += 1;
                if (header >= 0 && header <= 127) {
                    const count = header + 1;
                    for (let i = 0; i < count && offset < sourceEnd && outputOffset < target.length; i += 1) {
                        target[outputOffset] = source.getUint8(offset);
                        outputOffset += 1;
                        offset += 1;
                    }
                } else if (header >= -127 && header <= -1) {
                    const count = 1 - header;
                    const value = offset < sourceEnd ? source.getUint8(offset) : 0;
                    offset += 1;
                    for (let i = 0; i < count && outputOffset < target.length; i += 1) {
                        target[outputOffset] = value;
                        outputOffset += 1;
                    }
                }
            }
        }

        function canvasToPngBlob(canvas) {
            return new Promise((resolve, reject) => {
                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error('PSD 미리보기 이미지를 만들 수 없습니다.'));
                }, 'image/png');
            });
        }

        async function createPsdPreviewObjectUrl(file) {
            const buffer = await file.arrayBuffer();
            const view = new DataView(buffer);
            if (readAscii(view, 0, 4) !== '8BPS') throw new Error('PSD 파일 형식이 아닙니다.');

            const version = view.getUint16(4);
            const channels = view.getUint16(12);
            const height = view.getUint32(14);
            const width = view.getUint32(18);
            const depth = view.getUint16(22);
            const colorMode = view.getUint16(24);
            if (version !== 1 || depth !== 8 || ![1, 3].includes(colorMode)) {
                throw new Error('현재는 8-bit RGB/Grayscale PSD의 합성 미리보기만 지원합니다.');
            }

            let offset = 26;
            offset += 4 + view.getUint32(offset);
            offset += 4 + view.getUint32(offset);
            offset += 4 + view.getUint32(offset);
            const compression = view.getUint16(offset);
            offset += 2;

            const pixelCount = width * height;
            const channelData = Array.from({ length: channels }, () => new Uint8Array(pixelCount));
            if (compression === 0) {
                for (let channel = 0; channel < channels; channel += 1) {
                    channelData[channel].set(new Uint8Array(buffer, offset, pixelCount));
                    offset += pixelCount;
                }
            } else if (compression === 1) {
                const rowCount = channels * height;
                const rowLengths = new Uint16Array(rowCount);
                for (let i = 0; i < rowCount; i += 1) {
                    rowLengths[i] = view.getUint16(offset);
                    offset += 2;
                }
                for (let channel = 0; channel < channels; channel += 1) {
                    for (let row = 0; row < height; row += 1) {
                        const rowLength = rowLengths[channel * height + row];
                        const rowTarget = channelData[channel].subarray(row * width, (row + 1) * width);
                        decodePackBitsRow(view, offset, offset + rowLength, rowTarget);
                        offset += rowLength;
                    }
                }
            } else {
                throw new Error('지원하지 않는 PSD 압축 방식입니다.');
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d');
            const imageData = context.createImageData(width, height);
            for (let i = 0; i < pixelCount; i += 1) {
                const target = i * 4;
                if (colorMode === 1) {
                    const gray = channelData[0][i];
                    imageData.data[target] = gray;
                    imageData.data[target + 1] = gray;
                    imageData.data[target + 2] = gray;
                    imageData.data[target + 3] = channels > 1 ? channelData[1][i] : 255;
                } else {
                    imageData.data[target] = channelData[0][i];
                    imageData.data[target + 1] = channelData[1]?.[i] ?? channelData[0][i];
                    imageData.data[target + 2] = channelData[2]?.[i] ?? channelData[0][i];
                    imageData.data[target + 3] = channels > 3 ? channelData[3][i] : 255;
                }
            }
            context.putImageData(imageData, 0, 0);
            return URL.createObjectURL(await canvasToPngBlob(canvas));
        }

        async function showLocalImageFile(file) {
            if (!isSupportedLocalImageFile(file)) return;
            const overlay = document.getElementById('localImageOverlay');
            if (!overlay) return;

            try {
                const nextObjectUrl = isPsdFile(file)
                    ? await createPsdPreviewObjectUrl(file)
                    : URL.createObjectURL(file);
                if (localImageObjectUrl) URL.revokeObjectURL(localImageObjectUrl);
                localImageObjectUrl = nextObjectUrl;
                overlay.src = localImageObjectUrl;
                overlay.classList.remove('hidden');
                overlay.style.visibility = 'visible';
                updateLocalImageButtonState(true);
            } catch (error) {
                alert(error.message || '이미지를 불러오지 못했습니다.');
            }
        }

        function getDraggedImageFile(dataTransfer) {
            if (!dataTransfer) return null;
            return Array.from(dataTransfer.files || []).find(isSupportedLocalImageFile) || null;
        }

        function hasDraggedImage(dataTransfer) {
            if (!dataTransfer) return false;
            return Array.from(dataTransfer.items || []).some(item => {
                return item.kind === 'file' && (!item.type || item.type.startsWith('image/') || item.type.includes('photoshop'));
            });
        }

        function setLocalImageDropActive(isActive) {
            const frame = document.getElementById('chartPreviewFrame');
            if (!frame) return;
            frame.classList.toggle('ring-2', isActive);
            frame.classList.toggle('ring-emerald-400', isActive);
            frame.classList.toggle('ring-offset-2', isActive);
        }

        function handleLocalImageDragEnter(event) {
            if (!hasDraggedImage(event.dataTransfer)) return;
            event.preventDefault();
            localImageDragDepth += 1;
            setLocalImageDropActive(true);
        }

        function handleLocalImageDragOver(event) {
            if (!hasDraggedImage(event.dataTransfer)) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = 'copy';
        }

        function handleLocalImageDragLeave(event) {
            if (!hasDraggedImage(event.dataTransfer)) return;
            event.preventDefault();
            localImageDragDepth = Math.max(localImageDragDepth - 1, 0);
            if (localImageDragDepth === 0) setLocalImageDropActive(false);
        }

        function handleLocalImageDrop(event) {
            event.preventDefault();
            localImageDragDepth = 0;
            setLocalImageDropActive(false);
            showLocalImageFile(getDraggedImageFile(event.dataTransfer));
        }

        function clampChartRangeValue(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function renderChartRangeEditor() {
            const editor = document.getElementById('chartRangeEditor');
            const box = document.getElementById('chartRangeBox');
            const button = document.getElementById('toggleChartRangeEditorBtn');
            if (!editor || !box || !button) return;

            editor.classList.toggle('hidden', !isChartRangeEditorVisible);
            button.setAttribute('aria-pressed', String(isChartRangeEditorVisible));
            button.classList.toggle('bg-blue-600', isChartRangeEditorVisible);
            button.classList.toggle('text-white', isChartRangeEditorVisible);
            button.classList.toggle('hover:bg-blue-700', isChartRangeEditorVisible);
            button.classList.toggle('bg-blue-100', !isChartRangeEditorVisible);
            button.classList.toggle('text-blue-700', !isChartRangeEditorVisible);
            button.classList.toggle('hover:bg-blue-200', !isChartRangeEditorVisible);

            box.style.left = `${chartRange.x}%`;
            box.style.top = `${chartRange.y}%`;
            box.style.width = `${chartRange.width}%`;
            box.style.height = `${chartRange.height}%`;

            const right = 100 - chartRange.x - chartRange.width;
            const bottom = 100 - chartRange.y - chartRange.height;
            const masks = {
                top: { left: 0, top: 0, width: 100, height: chartRange.y },
                right: { left: chartRange.x + chartRange.width, top: chartRange.y, width: right, height: chartRange.height },
                bottom: { left: 0, top: chartRange.y + chartRange.height, width: 100, height: bottom },
                left: { left: 0, top: chartRange.y, width: chartRange.x, height: chartRange.height }
            };

            Object.entries(masks).forEach(([name, rect]) => {
                const mask = editor.querySelector(`[data-range-mask="${name}"]`);
                if (!mask) return;
                mask.style.left = `${rect.left}%`;
                mask.style.top = `${rect.top}%`;
                mask.style.width = `${Math.max(rect.width, 0)}%`;
                mask.style.height = `${Math.max(rect.height, 0)}%`;
            });
        }

        function scheduleChartRangeUpdate() {
            if (chartRangeFramePending) return;
            chartRangeFramePending = true;
            requestAnimationFrame(() => {
                chartRangeFramePending = false;
                createOrUpdateChart();
            });
        }

        function handleChartRangePointerMove(event) {
            if (!chartRangeDrag) return;
            const frame = document.getElementById('chartPreviewFrame');
            const bounds = frame.getBoundingClientRect();
            const deltaX = (event.clientX - chartRangeDrag.clientX) / bounds.width * 100;
            const deltaY = (event.clientY - chartRangeDrag.clientY) / bounds.height * 100;
            const start = chartRangeDrag.range;
            const minimumSize = 20;
            const handle = chartRangeDrag.handle;
            let next = { ...start };

            if (handle === 'move') {
                next.x = clampChartRangeValue(start.x + deltaX, 0, 100 - start.width);
                next.y = clampChartRangeValue(start.y + deltaY, 0, 100 - start.height);
            } else {
                if (handle.includes('e')) {
                    next.width = clampChartRangeValue(start.width + deltaX, minimumSize, 100 - start.x);
                }
                if (handle.includes('s')) {
                    next.height = clampChartRangeValue(start.height + deltaY, minimumSize, 100 - start.y);
                }
                if (handle.includes('w')) {
                    const rightEdge = start.x + start.width;
                    next.x = clampChartRangeValue(start.x + deltaX, 0, rightEdge - minimumSize);
                    next.width = rightEdge - next.x;
                }
                if (handle.includes('n')) {
                    const bottomEdge = start.y + start.height;
                    next.y = clampChartRangeValue(start.y + deltaY, 0, bottomEdge - minimumSize);
                    next.height = bottomEdge - next.y;
                }
            }

            chartRange = next;
            renderChartRangeEditor();
            scheduleChartRangeUpdate();
        }

        function stopChartRangeInteraction() {
            if (!chartRangeDrag) return;
            chartRangeDrag = null;
            window.removeEventListener('pointermove', handleChartRangePointerMove);
            window.removeEventListener('pointerup', stopChartRangeInteraction);
            createOrUpdateChart();
        }

        function startChartRangeInteraction(event) {
            if (!isChartRangeEditorVisible) return;
            event.preventDefault();
            const handle = event.target.closest('[data-range-handle]')?.dataset.rangeHandle || 'move';
            chartRangeDrag = {
                handle,
                clientX: event.clientX,
                clientY: event.clientY,
                range: { ...chartRange }
            };
            window.addEventListener('pointermove', handleChartRangePointerMove);
            window.addEventListener('pointerup', stopChartRangeInteraction);
        }

        function toggleChartRangeEditor() {
            isChartRangeEditorVisible = !isChartRangeEditorVisible;
            renderChartRangeEditor();
        }

        function renderLayoutEditor() {
            const controls = document.getElementById('layoutEditorControls');
            const panel = document.getElementById('layoutEditorPanel');
            const button = document.getElementById('toggleLayoutEditorBtn');
            const label = button?.querySelector('.layout-editor-label');
            const mainIcon = button?.querySelector('.layout-editor-main-icon');
            if (!controls || !panel || !button) return;

            controls.classList.toggle('max-h-0', !isLayoutEditorVisible);
            controls.classList.toggle('opacity-0', !isLayoutEditorVisible);
            controls.classList.toggle('py-0', !isLayoutEditorVisible);
            controls.classList.toggle('pointer-events-none', !isLayoutEditorVisible);
            controls.classList.toggle('overflow-hidden', !isLayoutEditorVisible);
            controls.classList.toggle('max-h-[32rem]', isLayoutEditorVisible);
            controls.classList.toggle('opacity-100', isLayoutEditorVisible);
            controls.classList.toggle('py-2', isLayoutEditorVisible);
            controls.classList.toggle('pointer-events-auto', isLayoutEditorVisible);
            controls.classList.toggle('overflow-visible', isLayoutEditorVisible);
            button.setAttribute('aria-expanded', String(isLayoutEditorVisible));
            button.classList.toggle('bg-blue-600', isLayoutEditorVisible);
            button.classList.toggle('hover:bg-blue-700', isLayoutEditorVisible);
            button.classList.toggle('bg-gray-800', !isLayoutEditorVisible);
            button.classList.toggle('hover:bg-gray-700', !isLayoutEditorVisible);
            label?.classList.toggle('hidden', !isLayoutEditorVisible);
            mainIcon?.classList.toggle('hidden', isLayoutEditorVisible);
        }

        function toggleLayoutEditor() {
            isLayoutEditorVisible = !isLayoutEditorVisible;
            if (!isLayoutEditorVisible && isChartRangeEditorVisible) {
                isChartRangeEditorVisible = false;
                renderChartRangeEditor();
            }
            renderLayoutEditor();
        }

        function resetChartRange() {
            chartRange = { ...DEFAULT_CHART_RANGE };
            renderChartRangeEditor();
            createOrUpdateChart();
        }

        function setupInitialFields() {
            const baseColors = getBaseColors();
            addInputRow('찬성', 30, baseColors[0]['1']);
            addInputRow('모름', 20, baseColors[1]['1']);
            addInputRow('반대', 50, baseColors[2]['1']);
        }
        
        window.onload = () => {
            setupInitialFields();
            updateScreenGuide();
            renderLayoutEditor();
            renderChartRangeEditor();
            updateUIForChartType(document.getElementById('chartType').value);
            updateYAxisStartButtons();
            createOrUpdateChart();

            if (document.fonts?.load) {
                document.fonts.load("16px 'MBC Chart'")
                    .then(() => createOrUpdateChart())
                    .catch(() => {});
            }

            document.getElementById('chartType').addEventListener('change', (e) => {
                const chartType = e.target.value;
                const isMultiSet = chartType === 'line' || chartType === 'singleStackedBar' || chartType === 'radar' || chartType === 'sankey'; 
                
                document.getElementById('addDatasetBtn').classList.toggle('hidden', !isMultiSet);
                const container = document.getElementById('additional-datasets-container');
                container.classList.toggle('hidden', !isMultiSet);
                
                if (!isMultiSet) container.innerHTML = '';
                
                updateUIForChartType(chartType);
                refreshSankeyTransitionRows(chartType === 'sankey');
                createOrUpdateChart();
            });

            document.getElementById('mainDatasetName').addEventListener('input', () => {
                refreshSankeyTransitionRows(false);
                createOrUpdateChart();
            });
            document.getElementById('mainDatasetColor').addEventListener('input', createOrUpdateChart); 
            document.getElementById('toggleItemNamesBtn').addEventListener('click', () => {
                areItemNamesVisible = !areItemNamesVisible;
                updateItemNameVisibility();
                if (!areItemNamesVisible) {
                    document.querySelector('#data-input-container .item-value-input')?.focus();
                }
            });
            document.getElementById('addFieldBtn').addEventListener('click', () => addInputRow());
            document.getElementById('addDatasetBtn').addEventListener('click', addDataset);
            document.getElementById('addSankeyTransitionBtn').addEventListener('click', () => addSankeyTransitionRow({}, true));
            document.getElementById('saveChartBtn').addEventListener('click', saveChartAsImage);
            document.getElementById('saveTransparentChartBtn').addEventListener('click', saveGraphOnlyTransparentPng);
            document.getElementById('toggleScreenGuideBtn').addEventListener('click', () => {
                isScreenGuideVisible = !isScreenGuideVisible;
                updateScreenGuide();
            });
            document.getElementById('loadLocalImageBtn').addEventListener('click', () => {
                document.getElementById('localImageInput').click();
            });
            document.getElementById('localImageInput').addEventListener('change', (event) => {
                showLocalImageFile(event.target.files?.[0]);
            });
            document.getElementById('clearLocalImageBtn').addEventListener('click', (event) => {
                event.stopPropagation();
                clearLocalImageOverlay();
            });
            document.getElementById('chartPreviewFrame').addEventListener('dragenter', handleLocalImageDragEnter);
            document.getElementById('chartPreviewFrame').addEventListener('dragover', handleLocalImageDragOver);
            document.getElementById('chartPreviewFrame').addEventListener('dragleave', handleLocalImageDragLeave);
            document.getElementById('chartPreviewFrame').addEventListener('drop', handleLocalImageDrop);
            document.getElementById('toggleLayoutEditorBtn').addEventListener('click', toggleLayoutEditor);
            document.getElementById('toggleChartRangeEditorBtn').addEventListener('click', toggleChartRangeEditor);
            document.getElementById('resetChartRangeBtn').addEventListener('click', resetChartRange);
            document.getElementById('chartRangeBox').addEventListener('pointerdown', startChartRangeInteraction);
            document.getElementById('barWidthSlider').addEventListener('input', (event) => {
                const chartType = document.getElementById('chartType').value;
                if (chartType === 'line') {
                    lineStrokeWidth = Number(event.target.value);
                } else {
                    barWidthPercent = Number(event.target.value);
                }
                createOrUpdateChart();
            });
            document.getElementById('toggleLinePointStyleBtn').addEventListener('click', () => {
                linePointStyle = linePointStyle === 'circle'
                    ? 'rect'
                    : (linePointStyle === 'rect' ? 'none' : 'circle');
                updateLinePointStyleButton();
                createOrUpdateChart();
            });
            document.getElementById('fillOpacitySlider').addEventListener('input', (event) => {
                fillOpacityPercent = Number(event.target.value);
                document.getElementById('fillOpacityValue').innerText = `${fillOpacityPercent}%`;
                createOrUpdateChart();
            });
            document.getElementById('yAxisStartControl').addEventListener('click', (event) => {
                const button = event.target.closest('[data-y-axis-start]');
                if (!button) return;
                yAxisStartMode = button.dataset.yAxisStart;
                updateYAxisStartButtons();
                createOrUpdateChart();
            });
            document.getElementById('graphOnlyBtn').addEventListener('click', function() {
                isGraphOnlyMode = !isGraphOnlyMode;
                updateGraphOnlyButtonState();
                createOrUpdateChart();
            });
            document.getElementById('data-input-container').addEventListener('input', (event) => {
                syncLineDataInputs();
                if (event.target.type === 'text') refreshSankeyTransitionRows(true);
                createOrUpdateChart();
                updateAllTotals();
            });
            document.getElementById('additional-datasets-container').addEventListener('input', (event) => {
                if (event.target.classList.contains('dataset-name')) refreshSankeyTransitionRows(false);
                createOrUpdateChart();
                updateAllTotals();
            });
            
            // 토글 버튼 리스너 (수정됨)
            document.getElementById('toggleLabelBtn').addEventListener('click', function() {
                isDataLabelVisible = !isDataLabelVisible;
                this.innerText = isDataLabelVisible ? '수치 숨기기' : '수치 표시하기';
                
                // 스타일 변경 (무채색)
                this.classList.remove('bg-gray-300', 'text-gray-800', 'hover:bg-gray-400', 'bg-gray-700', 'text-white', 'hover:bg-gray-800');
                
                if (isDataLabelVisible) {
                    // ON (수치 보임) -> 밝은 회색
                    this.classList.add('bg-gray-300', 'text-gray-800', 'hover:bg-gray-400');
                } else {
                    // OFF (수치 숨김) -> 어두운 회색
                    this.classList.add('bg-gray-700', 'text-white', 'hover:bg-gray-800');
                }
                createOrUpdateChart();
            });

            document.getElementById('calc1-total').addEventListener('input', calculate1);
            document.getElementById('calc1-percent').addEventListener('input', calculate1);
            document.getElementById('calc2-total').addEventListener('input', calculate2);
            document.getElementById('calc2-part').addEventListener('input', calculate2);
            document.getElementById('calc3-old').addEventListener('input', calculate3);
            document.getElementById('calc3-new').addEventListener('input', calculate3);
            document.getElementById('calc4-val').addEventListener('input', calculate4);
            document.getElementById('calc4-percent').addEventListener('input', calculate4);
        };
    </script>
